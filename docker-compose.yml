services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sr_groups
      POSTGRES_USER: sr_user
      POSTGRES_PASSWORD: sr_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sr_user -d sr_groups"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"

  forecasting:
    build: ./apps/forecasting
    environment:
      DATABASE_URL: postgres://sr_user:sr_password@postgres:5432/sr_groups
      INTERNAL_SERVICE_TOKEN: change-this-internal-token
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5001"

  local-ai-backend:
    build: ./apps/chatbot
    environment:
      PORT: 4000
      DATABASE_URL: postgres://sr_user:sr_password@postgres:5432/sr_groups
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-this-secret}
      INTERNAL_SERVICE_TOKEN: change-this-internal-token
      BILLING_API_URL: ${BILLING_API_URL:-http://host.docker.internal:3000}
      FORECASTING_SERVICE_URL: http://forecasting:5001
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3}
      ALLOWED_LOCAL_MODELS: ${ALLOWED_LOCAL_MODELS:-qwen3,qwen,llama3,mistral,gemma}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      forecasting:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "4000:4000"

volumes:
  postgres-data:
  ollama-data:
