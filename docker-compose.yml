services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sr_groups
      POSTGRES_USER: sr_user
      POSTGRES_PASSWORD: sr_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sr_user -d sr_groups"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"

  forecasting:
    build: ./apps/forecasting
    environment:
      DATABASE_URL: postgres://sr_user:sr_password@postgres:5432/sr_groups
      INTERNAL_SERVICE_TOKEN: change-this-internal-token
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5001"

  local-ai-backend:
    build: ./apps/chatbot
    environment:
      PORT: 4000
      DATABASE_URL: postgres://sr_user:sr_password@postgres:5432/sr_groups
      JWT_SECRET: change-this-long-random-secret
      INTERNAL_SERVICE_TOKEN: change-this-internal-token
      FORECASTING_SERVICE_URL: http://forecasting:5001
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3
      WEB_ORIGIN: http://localhost:4000
    depends_on:
      postgres:
        condition: service_healthy
      forecasting:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "4000:4000"

volumes:
  postgres-data:
  ollama-data:
